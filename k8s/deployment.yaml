apiVersion: apps/v1
kind: Deployment
metadata:
  name: universal-deployment
  labels:
    app: universal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: universal
  template:
    metadata:
      labels:
        app: universal
    spec:
      containers:
      - name: universal
        image: universal:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PORT
          value: "8000"
        - name: ENVIRONMENT
          value: "production"  # Change to "development" for local testing
        - name: AUTH0_DOMAIN
          value: ""  # Set your Auth0 domain (e.g. dev-xxx.us.auth0.com)
        - name: API_AUDIENCE
          value: "https://universal-app/api"  # Your Auth0 API identifier
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5

